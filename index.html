<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>SOUNDSTATE XR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- Dark background -->
    <a-sky src="sky.jpg" rotation="0 -90 0"></a-sky>

    <!-- DRIFT -->
    <a-entity position="0 1.5 -3"
      animation="property: position; to: 0 1.9 -3; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine">
      <a-sphere radius="0.3" src="marble.jpg" class="sound-object"></a-sphere>
      <a-text value="DRIFT" position="0 0.5 0" align="center" color="#E8E8FF" width="1.5" side="double"
        look-at="#camera"></a-text>
    </a-entity>

    <!-- PULSE -->
    <a-entity position="-2 1.5 -2.5"
      animation="property: position; to: -2 1.9 -2.5; dur: 1600; dir: alternate; loop: true; easing: easeInOutSine">
      <a-sphere radius="0.3" src="marble_cliff.jpg" class="sound-object"></a-sphere>
      <a-text value="PULSE" position="0 0.5 0" align="center" color="#E8E8FF" width="1.5" side="double"
        look-at="#camera"></a-text>
    </a-entity>

    <!-- ECHO -->
    <a-entity position="2 1.5 -2.5"
      animation="property: position; to: 2 1.9 -2.5; dur: 2400; dir: alternate; loop: true; easing: easeInOutSine">
      <a-sphere radius="0.3" src="rocky_trail.jpg" class="sound-object"></a-sphere>
      <a-text value="ECHO" position="0 0.5 0" align="center" color="#E8E8FF" width="1.5" side="double"
        look-at="#camera"></a-text>
    </a-entity>

    <!-- STILL -->
    <a-entity position="-3 1.5 0"
      animation="property: position; to: -3 1.9 0; dur: 3000; dir: alternate; loop: true; easing: easeInOutSine">
      <a-sphere radius="0.3" src="rusty_metal.jpg" class="sound-object"></a-sphere>
      <a-text value="STILL" position="0 0.5 0" align="center" color="#E8E8FF" width="1.5" side="double"
        look-at="#camera" rotation="0 90 0"></a-text>
    </a-entity>

    <!-- STATIC -->
    <a-entity position="3 1.5 0"
      animation="property: position; to: 3 1.9 0; dur: 1800; dir: alternate; loop: true; easing: easeInOutSine">
      <a-sphere radius="0.3" src="painted_concrete.jpg" class="sound-object"></a-sphere>
      <a-text value="STATIC" position="0 0.5 0" align="center" color="#E8E8FF" width="1.5" side="double"
        look-at="#camera" rotation="0 270 0"></a-text>
    </a-entity>

    <!-- NOISE -->
    <a-entity position="0 1.5 3"
      animation="property: position; to: 0 1.9 3; dur: 2200; dir: alternate; loop: true; easing: easeInOutSine">
      <a-sphere radius="0.3" src="metal.jpg" class="sound-object"></a-sphere>
      <a-text value="NOISE" position="0 0.5 0" align="center" color="#E8E8FF" width="1.5" side="double"
        look-at="#camera" rotation="0 180 0"></a-text>
    </a-entity>

    <!-- Camera with gaze cursor -->
    <a-camera id="camera" position="0 1.6 0">
      <a-cursor color="#FF00FF" opacity="0.8"></a-cursor>
    </a-camera>

    <script>
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var activeNodes = {};
      var soundData = {};

      var entityColors = {
        'DRIFT': '#DB2777', 'PULSE': '#0EA5E9', 'ECHO': '#A855F7',
        'STILL': '#2DD4BF', 'STATIC': '#F59E0B', 'NOISE': '#F43F5E'
      };

      fetch('https://afisha-api.onrender.com/api/sounds')
        .then(function (res) { return res.json(); })
        .then(function (data) {
          data.forEach(function (s) {
            soundData[s.name] = s.sound;
          });
          console.log('Sound states loaded:', soundData);
        });

      function spawnParticles(entity, color, texture) {
        for (var i = 0; i < 15; i++) {
          var p = document.createElement('a-sphere');
          var angle = (i / 8) * Math.PI * 2;
          var px = Math.cos(angle) * 0.6;
          var pz = Math.sin(angle) * 0.6;
          var py = Math.random() * 0.3;
          p.setAttribute('radius', '0.02');
          p.setAttribute('class', 'particle');
          if (texture) p.setAttribute('src', texture);
          p.setAttribute('opacity', '0.9');
          p.setAttribute('position', px + ' ' + py + ' ' + pz);
          p.setAttribute('animation',
            'property: position; to: ' + (px * 1.1) + ' ' + (py + 0.1) + ' ' + (pz * 1.1) +
            '; dur: 1500; dir: alternate; loop: true; easing: easeInOutSine');
          entity.appendChild(p);
          // setTimeout(function (el) {
          //   el.parentNode && el.parentNode.removeChild(el);
          // }, 900, p);
        }
      }

      function playSound(name) {
        if (activeNodes[name]) return;
        var s = soundData[name];
        if (!s) return;

        var gainNode = audioCtx.createGain();
        gainNode.gain.value = 0;
        var filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = s.filterFreq || 1000;

        if (s.type === 'noise') {
          var bufferSize = audioCtx.sampleRate * 2;
          var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
          var data = buffer.getChannelData(0);
          for (var i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
          }
          var source = audioCtx.createBufferSource();
          source.buffer = buffer;
          source.loop = true;
          source.connect(filter);
          filter.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          source.start();
          gainNode.gain.linearRampToValueAtTime(s.volume || 0.2, audioCtx.currentTime + 0.5);
          activeNodes[name] = { source: source, gain: gainNode };

        } else if (s.type === 'static') {
          var bufferSize = audioCtx.sampleRate * 2;
          var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
          var data = buffer.getChannelData(0);
          for (var i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * (s.intensity || 0.3);
          }
          var source = audioCtx.createBufferSource();
          source.buffer = buffer;
          source.loop = true;
          source.connect(filter);
          filter.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          source.start();
          gainNode.gain.linearRampToValueAtTime(s.volume || 0.2, audioCtx.currentTime + 0.5);
          activeNodes[name] = { source: source, gain: gainNode };

        } else {
          var osc = audioCtx.createOscillator();
          osc.frequency.value = s.frequency || 100;
          osc.type = 'sine';

          if (s.lfoSpeed) {
            var lfo = audioCtx.createOscillator();
            var lfoGain = audioCtx.createGain();
            lfo.frequency.value = s.lfoSpeed;
            lfoGain.gain.value = 0.3;
            lfo.connect(lfoGain);
            lfoGain.connect(gainNode.gain);
            lfo.start();
            activeNodes[name] = { osc: osc, lfo: lfo, gain: gainNode };
          } else {
            activeNodes[name] = { osc: osc, gain: gainNode };
          }

          if (s.type === 'echo' && s.delayTime) {
            var delay = audioCtx.createDelay();
            delay.delayTime.value = s.delayTime;
            var feedback = audioCtx.createGain();
            feedback.gain.value = 0.4;
            osc.connect(filter);
            filter.connect(delay);
            delay.connect(feedback);
            feedback.connect(delay);
            delay.connect(gainNode);
          } else {
            osc.connect(filter);
            filter.connect(gainNode);
          }

          gainNode.connect(audioCtx.destination);
          osc.start();
          gainNode.gain.linearRampToValueAtTime(s.volume || 0.2, audioCtx.currentTime + 0.5);
        }
      }

      function stopSound(name) {
        if (!activeNodes[name]) return;
        var nodes = activeNodes[name];
        var gain = nodes.gain;
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        setTimeout(function () {
          try {
            if (nodes.osc) nodes.osc.stop();
            if (nodes.lfo) nodes.lfo.stop();
            if (nodes.source) nodes.source.stop();
          } catch (e) { }
          delete activeNodes[name];
        }, 600);
      }

      document.querySelector('a-scene').addEventListener('loaded', function () {
        document.querySelectorAll('a-sphere').forEach(function (sphere) {
          var entity = sphere.parentNode;
          var text = entity.querySelector('a-text');
          var name = text ? text.getAttribute('value') : null;
          var color = entityColors[name] || '#ffffff';

          sphere.addEventListener('mouseenter', function () {
            entity.setAttribute('scale', '1.3 1.3 1.3');
            if (name) {
              playSound(name);
              spawnParticles(entity, color, sphere.getAttribute('src'));
            }
          });

          sphere.addEventListener('mouseleave', function () {
            entity.setAttribute('scale', '1 1 1');
            if (name) stopSound(name);
            // Remove particles
            entity.querySelectorAll('a-sphere.particle').forEach(function (p) {
              p.parentNode.removeChild(p);
            });
          });
        });
      });
    </script>

  </a-scene>
</body>

</html>
